name: autonomous-finops-agent

description: "FinOps agent for SaaS seat pruning and LLM API tier routing"

version: "1.0"

entry_point: server.app:app

tasks:
  - id: easy
    grader: graders:grade_easy
  - id: medium
    grader: graders:grade_medium
  - id: hard
    grader: graders:grade_hard

endpoints:
  state: GET /state
  grade: POST /grade
